<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/pinterest-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pinterest Clone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <nav class="sidebar__nav">
        <ul class="sidebar__list">
          <li>
            <button class="sidebar__item sidebar__item--active" data-view="home" title="Inicio">
              <span class="sidebar__icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
              </span>
              <span class="sidebar__label">Inicio</span>
            </button>
          </li>
          <li>
            <button class="sidebar__item" data-view="explore" title="Explorar">
              <span class="sidebar__icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
              </span>
              <span class="sidebar__label">Explorar</span>
            </button>
          </li>
          <li>
            <button class="sidebar__item" data-view="favorites" title="Guardados">
              <span class="sidebar__icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
                <span class="sidebar__badge" id="sidebarBadge" hidden>0</span>
              </span>
              <span class="sidebar__label">Guardados</span>
            </button>
          </li>
          <li>
            <button class="sidebar__item" data-view="messages" title="Mensajes">
              <span class="sidebar__icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
              </span>
              <span class="sidebar__label">Mensajes</span>
            </button>
          </li>
          <li>
            <button class="sidebar__item" data-view="notifications" title="Notificaciones">
              <span class="sidebar__icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
              </span>
              <span class="sidebar__label">Notificaciones</span>
            </button>
          </li>
        </ul>
      </nav>
      <div class="sidebar__bottom">
        <button class="sidebar__item sidebar__collapse-btn" id="collapseBtn" title="Colapsar menú">
          <span class="sidebar__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="collapseIcon"><polyline points="15 18 9 12 15 6"/></svg>
          </span>
          <span class="sidebar__label">Colapsar</span>
        </button>
      </div>
    </aside>

    <!-- BOTTOM BAR (Móvil) -->
    <nav class="bottom-bar" id="bottomBar">
      <button class="bottom-bar__item bottom-bar__item--active" data-view="home">
        <span class="bottom-bar__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
        <span class="bottom-bar__label">Inicio</span>
      </button>
      <button class="bottom-bar__item" data-view="explore">
        <span class="bottom-bar__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg></span>
        <span class="bottom-bar__label">Explorar</span>
      </button>
      <button class="bottom-bar__item" data-view="favorites">
        <span class="bottom-bar__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
          <span class="bottom-bar__badge" id="bottomBadge" hidden>0</span>
        </span>
        <span class="bottom-bar__label">Guardados</span>
      </button>
      <button class="bottom-bar__item" data-view="notifications">
        <span class="bottom-bar__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg></span>
        <span class="bottom-bar__label">Notificaciones</span>
      </button>
    </nav>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="app__main" id="appMain">

      <!-- HEADER -->
      <header class="header" id="header">
        <div class="header__inner">
          <button class="header__logo" id="logoBtn" aria-label="Volver al inicio">
            <svg class="header__logo-icon" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 0C5.373 0 0 5.373 0 12c0 5.084 3.163 9.426 7.627 11.174-.105-.949-.2-2.405.042-3.441.218-.937 1.407-5.965 1.407-5.965s-.359-.719-.359-1.782c0-1.668.967-2.914 2.171-2.914 1.023 0 1.518.769 1.518 1.69 0 1.029-.655 2.568-.994 3.995-.283 1.194.599 2.169 1.777 2.169 2.133 0 3.772-2.249 3.772-5.495 0-2.873-2.064-4.882-5.012-4.882-3.414 0-5.418 2.561-5.418 5.207 0 1.031.397 2.138.893 2.738a.36.36 0 0 1 .083.345l-.333 1.36c-.053.22-.174.267-.402.161-1.499-.698-2.436-2.889-2.436-4.649 0-3.785 2.75-7.262 7.929-7.262 4.163 0 7.398 2.967 7.398 6.931 0 4.136-2.607 7.464-6.227 7.464-1.216 0-2.359-.631-2.75-1.378l-.748 2.853c-.271 1.043-1.002 2.35-1.492 3.146C9.57 23.812 10.763 24 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0z"/>
            </svg>
            <span class="header__logo-text">Pinterest</span>
          </button>

          <form class="header__search" id="searchForm">
            <div class="header__search-wrapper">
              <svg class="header__search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="text" class="header__search-input" id="searchInput" placeholder="Buscar imágenes..." />
            </div>
          </form>

          <div class="header__actions">
            <button class="header__action-btn header__fav-btn" id="headerFavBtn" aria-label="Ver favoritos" title="Favoritos">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
              <span class="header__badge" id="headerBadge" hidden>0</span>
            </button>
            <button class="header__action-btn" id="darkModeBtn" aria-label="Cambiar tema" title="Modo oscuro">
              <svg id="darkModeIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>
            </button>
          </div>
        </div>
      </header>

      <!-- TOPIC PILLS -->
      <div class="topics" id="topics">
        <div class="topics__scroll" id="topicsScroll"></div>
      </div>

      <!-- SEARCH LABEL -->
      <div class="app__search-label" id="searchLabel" hidden>
        <h2 id="searchLabelText"></h2>
      </div>

      <!-- GALLERY -->
      <section class="gallery" id="gallery">
        <div class="gallery__masonry" id="masonryGrid"></div>
        <div class="gallery__status" id="galleryStatus" hidden></div>
        <div class="gallery__loading-more" id="loadingMore" hidden>
          <div class="gallery__spinner"></div>
          <span>Cargando más...</span>
        </div>
      </section>

      <!-- SENTINEL para infinite scroll -->
      <div id="scrollSentinel" style="height:1px"></div>

    </div>

    <!-- MODAL -->
    <div class="modal-backdrop" id="modalBackdrop">
      <div class="modal" id="modal">
        <button class="modal__close" id="modalClose" aria-label="Cerrar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <div class="modal__content">
          <div class="modal__image-section">
            <img src="" alt="" class="modal__image" id="modalImage" />
          </div>
          <div class="modal__details" id="modalDetails"></div>
        </div>
      </div>
    </div>

    <!-- BACK TO TOP -->
    <button class="back-to-top" id="backToTop" aria-label="Volver arriba">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
    </button>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
